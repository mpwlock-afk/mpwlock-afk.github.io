<!DOCTYPE html>
<html lang="nl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>holoconnects | Het ultieme communicatie ecosysteem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-black: #000000;
            --color-anthracite: #464646;
            --color-white: #FFFFFF;
            --color-lightgrey: #f8f9fa;
            --color-gold: #C87800;
            --color-yellow: #EA9914;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Outfit', sans-serif;
            background-color: var(--color-white);
            color: var(--color-black);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        html { scroll-behavior: smooth; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--color-lightgrey); }
        ::-webkit-scrollbar-thumb { background: var(--color-anthracite); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-gold); }

        .text-gradient-gold {
            background: linear-gradient(to right, var(--color-gold), var(--color-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .animate-fade-up { animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .glass-nav-light {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            color: black;
            box-shadow: 0 4px 30px rgba(0,0,0,0.03);
        }
        
        .glass-nav-dark {
            background: transparent;
            color: white;
        }

        .reveal-on-scroll { opacity: 0; transform: translateY(30px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-on-scroll.is-visible { opacity: 1; transform: translateY(0); }

        .soft-shadow { box-shadow: 0 20px 50px -10px rgba(0,0,0,0.08); }

        .holobox-3d-container { perspective: 1500px; }

        @keyframes ping-slow {
            75%, 100% { transform: scale(2.5); opacity: 0; }
        }
        .animate-ping-slow { animation: ping-slow 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-float-delayed { animation: float 6s ease-in-out 3s infinite; }

        .os-widget {
            background: linear-gradient(145deg, rgba(30,30,30,0.6) 0%, rgba(10,10,10,0.8) 100%);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { gold: 'var(--color-gold)', yellow: 'var(--color-yellow)' },
                        app: { black: 'var(--color-black)', grey: 'var(--color-lightgrey)', dark: 'var(--color-anthracite)' }
                    },
                    letterSpacing: { tighter: '-.04em', widest: '.2em' }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const RotatingText = ({ words, interval = 3000 }) => {
            const [index, setIndex] = useState(0);

            useEffect(() => {
                const timer = setInterval(() => {
                    setIndex((prev) => (prev + 1) % words.length);
                }, interval);
                return () => clearInterval(timer);
            }, [words, interval]);

            return (
                <span className="inline-grid relative overflow-visible pb-2 -mb-2">
                    {words.map((word, i) => {
                        const isActive = i === index;
                        const isExiting = i === (index - 1 + words.length) % words.length;
                        
                        return (
                            <span key={i} className={`col-start-1 row-start-1 transition-all duration-700 ease-in-out block ${
                                isActive ? 'opacity-100 translate-y-0 blur-0 scale-100' :
                                isExiting ? 'opacity-0 -translate-y-8 blur-sm scale-95 pointer-events-none' :
                                'opacity-0 translate-y-8 blur-sm scale-95 pointer-events-none'
                            }`}>
                                {word}
                            </span>
                        );
                    })}
                </span>
            );
        };

        const FadeIn = ({ children, className = "", delay = 0 }) => {
            const domRef = useRef();
            const [isVisible, setVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setTimeout(() => setVisible(true), delay);
                            observer.unobserve(domRef.current);
                        }
                    });
                }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
                if (domRef.current) observer.observe(domRef.current);
                return () => observer.disconnect();
            }, [delay]);

            return <div ref={domRef} className={`reveal-on-scroll ${isVisible ? 'is-visible' : ''} ${className}`}>{children}</div>;
        };

        const HoloboxRender = ({ model = '86', color = 'Black', angle = 'Front', scale = 1 }) => {
            const isMini = model === 'Mini';
            const isWhite = color === 'White';
            
            let transform = 'rotateY(0deg)';
            if (angle === 'Left') transform = 'rotateY(-35deg) rotateX(2deg)';
            if (angle === 'Right') transform = 'rotateY(35deg) rotateX(2deg)';

            const boxWidth = isMini ? 'w-[200px]' : 'w-[280px]';
            const boxHeight = isMini ? 'h-[340px]' : 'h-[560px]';
            const frameBg = isWhite ? 'bg-[#f0f0f0]' : 'bg-[#111111]';
            const frameBorder = isWhite ? 'border-[#ffffff]' : 'border-[#222222]';
            const shadow = isWhite ? 'shadow-[0_30px_60px_rgba(0,0,0,0.1)]' : 'shadow-[0_30px_60px_rgba(0,0,0,0.4)]';

            return (
                <div className={`holobox-3d-container flex items-center justify-center`} style={{ transform: `scale(${scale})` }}>
                    <div 
                        className={`relative ${boxWidth} ${boxHeight} ${frameBg} ${frameBorder} ${shadow} border-[12px] rounded-[2rem] transition-all duration-1000 ease-in-out flex flex-col items-center p-3`}
                        style={{ transform, transformStyle: 'preserve-3d' }}
                    >
                        <div className="w-full flex items-center gap-2 mb-3 px-2 opacity-60">
                            <i className={`ph-thin ph-atom text-sm ${isWhite ? 'text-gray-500' : 'text-gray-400'}`}></i>
                            <span className={`text-[6px] font-bold tracking-widest uppercase ${isWhite ? 'text-gray-500' : 'text-gray-400'}`}>holoconnects</span>
                        </div>
                        <div className="relative w-full flex-1 bg-[#050505] rounded-xl overflow-hidden shadow-inner flex flex-col items-center justify-end">
                            <div className="absolute inset-0 bg-gradient-to-tr from-transparent via-white/10 to-transparent skew-x-12 translate-x-[-50%] pointer-events-none z-20"></div>
                            <div className="absolute bottom-0 w-48 h-48 bg-brand-gold/20 blur-[40px] rounded-full z-0"></div>
                            <i className={`ph-fill ph-user text-white/90 filter drop-shadow-[0_0_20px_rgba(255,255,255,0.4)] relative z-10 ${isMini ? 'text-[180px] translate-y-8' : 'text-[300px] translate-y-12'}`}></i>
                        </div>
                        <div className="absolute top-1/2 -translate-y-1/2 left-2 w-1.5 h-16 bg-black/10 rounded-full"></div>
                        <div className="absolute top-1/2 -translate-y-1/2 right-2 w-1.5 h-16 bg-black/10 rounded-full"></div>
                    </div>
                </div>
            );
        };

        const NetworkGlobe = ({ theme = 'light' }) => {
            const mountRef = useRef(null);

            useEffect(() => {
                const currentMount = mountRef.current;
                if (!currentMount) return;

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(45, currentMount.clientWidth / currentMount.clientHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(currentMount.clientWidth, currentMount.clientHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                currentMount.appendChild(renderer.domElement);

                const mouseGroup = new THREE.Group();
                scene.add(mouseGroup);

                const globeGroup = new THREE.Group();
                mouseGroup.add(globeGroup);

                const radius = 5;
                const geometry = new THREE.SphereGeometry(radius, 64, 64);
                
                const blendMode = theme === 'dark' ? THREE.AdditiveBlending : THREE.NormalBlending;
                const pointOpacity = theme === 'dark' ? 0.6 : 0.3;

                const material = new THREE.PointsMaterial({
                    color: 0xC87800, size: 0.03, transparent: true, opacity: pointOpacity, blending: blendMode
                });
                const points = new THREE.Points(geometry, material);
                globeGroup.add(points);

                const getPos = (lat, lon, r) => {
                    const phi = (90 - lat) * (Math.PI / 180);
                    const theta = (lon + 180) * (Math.PI / 180);
                    return new THREE.Vector3(
                        -(r * Math.sin(phi) * Math.cos(theta)),
                        r * Math.cos(phi),
                        r * Math.sin(phi) * Math.sin(theta)
                    );
                };

                const hub = getPos(52, 4, radius); 
                const nodeOslo = getPos(60, 10, radius); 
                const nodeNY = getPos(40, -74, radius); 
                const nodeDubai = getPos(25, 55, radius); 

                const createNodeMarker = (pos, color) => {
                    const m = new THREE.Mesh(
                        new THREE.SphereGeometry(0.08, 16, 16),
                        new THREE.MeshBasicMaterial({ color })
                    );
                    m.position.copy(pos);
                    globeGroup.add(m);
                    return m;
                };

                createNodeMarker(hub, theme === 'dark' ? 0xffffff : 0x000000); 
                createNodeMarker(nodeOslo, 0xEA9914);
                createNodeMarker(nodeNY, 0xEA9914);
                createNodeMarker(nodeDubai, 0xEA9914);

                const curves = [];
                const addCurve = (start, end) => {
                    const midPoint = start.clone().lerp(end, 0.5).normalize().multiplyScalar(radius * 1.3);
                    const curve = new THREE.QuadraticBezierCurve3(start, midPoint, end);
                    curves.push(curve);

                    const linePoints = curve.getPoints(50);
                    const geom = new THREE.BufferGeometry().setFromPoints(linePoints);
                    const mat = new THREE.LineBasicMaterial({ color: 0xEA9914, transparent: true, opacity: 0.4 });
                    globeGroup.add(new THREE.Line(geom, mat));
                };

                addCurve(hub, nodeOslo);
                addCurve(hub, nodeNY);
                addCurve(hub, nodeDubai);

                const particles = [];
                const particleMat = new THREE.MeshBasicMaterial({ color: 0xEA9914 });
                const particleGeom = new THREE.SphereGeometry(0.05, 8, 8);
                
                curves.forEach(curve => {
                    const p = new THREE.Mesh(particleGeom, particleMat);
                    globeGroup.add(p);
                    particles.push({ mesh: p, curve: curve, progress: Math.random() });
                });

                camera.position.z = 13;
                mouseGroup.rotation.x = 0.2;
                mouseGroup.rotation.y = -0.5;

                let targetX = 0, targetY = 0;
                let mouseX = 0, mouseY = 0;

                const onMouseMove = (e) => {
                    mouseX = (e.clientX - window.innerWidth / 2) * 0.001;
                    mouseY = (e.clientY - window.innerHeight / 2) * 0.001;
                };
                window.addEventListener('mousemove', onMouseMove);

                let reqId;
                const animate = () => {
                    reqId = requestAnimationFrame(animate);
                    
                    globeGroup.rotation.y += 0.001;
                    targetX = mouseX * 0.5;
                    targetY = mouseY * 0.5;
                    mouseGroup.rotation.x += 0.05 * (targetY + 0.2 - mouseGroup.rotation.x);
                    mouseGroup.rotation.y += 0.05 * (targetX - 0.5 - mouseGroup.rotation.y);

                    particles.forEach(p => {
                        p.progress += 0.005;
                        if(p.progress > 1) p.progress = 0;
                        const pos = p.curve.getPointAt(p.progress);
                        p.mesh.position.copy(pos);
                    });

                    renderer.render(scene, camera);
                };
                animate();

                const onResize = () => {
                    if(!currentMount) return;
                    camera.aspect = currentMount.clientWidth / currentMount.clientHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(currentMount.clientWidth, currentMount.clientHeight);
                };
                window.addEventListener('resize', onResize);

                return () => {
                    window.removeEventListener('resize', onResize);
                    window.removeEventListener('mousemove', onMouseMove);
                    cancelAnimationFrame(reqId);
                    if(currentMount && currentMount.contains(renderer.domElement)) currentMount.removeChild(renderer.domElement);
                    geometry.dispose(); material.dispose(); renderer.dispose();
                };
            }, [theme]);

            return <div ref={mountRef} className="w-full h-full absolute inset-0 z-0 pointer-events-none" />;
        };

        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > window.innerHeight - 100);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${scrolled ? 'glass-nav-light py-4' : 'glass-nav-dark py-8'}`}>
                    <div className="max-w-[1400px] mx-auto px-6 lg:px-12 flex justify-between items-center">
                        <div className="flex items-center gap-3 cursor-pointer group">
                            <i className={`ph-thin ph-atom text-3xl group-hover:text-brand-gold transition-colors ${scrolled ? 'text-black' : 'text-white'}`}></i>
                            <span className={`font-bold text-xl tracking-widest mt-1 transition-colors ${scrolled ? 'text-black' : 'text-white'}`}>holoconnects</span>
                        </div>
                        
                        <div className="hidden lg:flex items-center gap-10">
                            {['Business Model', 'IRIS OS', 'Hardware', 'Over Ons'].map(item => (
                                <a key={item} href={`#${item.toLowerCase().replace(' ', '-')}`} 
                                   className={`text-xs font-bold uppercase tracking-widest transition-colors duration-300
                                   ${scrolled ? 'text-gray-800 hover:text-brand-gold' : 'text-gray-200 hover:text-brand-gold'}`}>
                                    {item}
                                </a>
                            ))}
                        </div>

                        <div className="flex items-center gap-6">
                            <button className={`hidden md:block text-xs font-bold uppercase tracking-widest transition-colors duration-300
                                ${scrolled ? 'text-gray-800 hover:text-brand-gold' : 'text-gray-200 hover:text-brand-gold'}`}>
                                IRIS OS Login
                            </button>
                            <button className={`px-8 py-3 rounded-full text-xs font-bold uppercase tracking-widest transition-all shadow-lg hover:scale-105 transform duration-300 
                                ${scrolled ? 'bg-black text-white hover:bg-brand-gold' : 'bg-white text-black hover:bg-brand-gold hover:text-white'}`}>
                                Boek Demo
                            </button>
                        </div>
                    </div>
                </nav>
            );
        };

        const Hero = () => {
            const [pos, setPos] = useState({ x: -1000, y: -1000 });
            const heroRef = useRef(null);

            useEffect(() => {
                setPos({ x: window.innerWidth / 2, y: window.innerHeight / 2 });
            }, []);

            const handleMouseMove = (e) => {
                if (!heroRef.current) return;
                const rect = heroRef.current.getBoundingClientRect();
                setPos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
            };

            return (
                <section ref={heroRef} onMouseMove={handleMouseMove} className="relative h-screen w-full overflow-hidden bg-white cursor-crosshair">
                    
                    <div className="absolute inset-0 z-0 flex items-center justify-center mt-20">
                        <div className="flex items-end justify-center gap-12 lg:gap-24 opacity-90">
                            <div className="hidden md:block"><HoloboxRender model="86" color="White" angle="Left" scale={0.8} /></div>
                            <HoloboxRender model="86" color="Black" angle="Front" scale={1} />
                            <div className="hidden lg:block"><HoloboxRender model="Mini" color="Black" angle="Right" scale={0.8} /></div>
                        </div>
                    </div>

                    <div className="absolute inset-0 z-10 pointer-events-none transition-all duration-75 ease-out"
                         style={{
                             background: `radial-gradient(circle 350px at ${pos.x}px ${pos.y}px, transparent 0%, rgba(0,0,0,0.85) 40%, #000000 70%)`
                         }}>
                    </div>

                    <div className="absolute inset-0 z-20 flex flex-col items-center justify-center text-center pointer-events-none mix-blend-difference text-white px-6">
                        <div className="animate-fade-up" style={{animationDelay: '0.1s', opacity: 0}}>
                            <span className="inline-flex items-center gap-3 px-5 py-2 rounded-full border border-white/20 text-[10px] font-bold tracking-widest uppercase mb-10 shadow-xl">
                                Innovation with a human touch
                            </span>
                        </div>
                        
                        <h1 className="text-5xl md:text-7xl lg:text-[100px] font-black tracking-tighter leading-[0.9] mb-8 animate-fade-up" style={{animationDelay: '0.3s', opacity: 0}}>
                            Real people,<br />
                            <span className="text-gradient-gold">
                                <RotatingText words={['real connections.', '24/7 hospitality.', 'global reach.', 'endless scale.']} />
                            </span>
                        </h1>
                        
                        <p className="text-lg md:text-2xl max-w-3xl mx-auto animate-fade-up leading-relaxed font-light" style={{animationDelay: '0.5s', opacity: 0}}>
                            Beweeg om de toekomst van communicatie te onthullen. <br/>Een virtuele aanwezigheid die de realiteit evenaart.
                        </p>
                    </div>

                    <div className="absolute bottom-20 left-1/2 -translate-x-1/2 z-30 animate-fade-up flex gap-6" style={{animationDelay: '0.7s', opacity: 0}}>
                        <a href="#business-model" className="px-10 py-5 bg-brand-gold text-black rounded-full font-bold text-xs uppercase tracking-widest hover:bg-brand-yellow transition-all shadow-[0_0_40px_rgba(200,120,0,0.3)] hover:-translate-y-1 transform duration-300 flex items-center justify-center gap-3">
                            Ontdek de ROI <i className="ph-bold ph-arrow-down text-lg"></i>
                        </a>
                    </div>
                </section>
            );
        };

        const BusinessModel = () => {
            return (
                <section id="business-model" className="py-32 relative z-10 bg-app-lightgrey border-b border-gray-200">
                    <div className="max-w-[1400px] mx-auto px-6 lg:px-12">
                        <FadeIn>
                            <div className="mb-16 md:flex justify-between items-end">
                                <div>
                                    <span className="inline-block text-brand-gold text-[10px] font-bold uppercase tracking-widest mb-4">Dubbel Rendement</span>
                                    <h2 className="text-4xl md:text-6xl font-black tracking-tighter mb-4 text-black">Van kostenpost <br/><span className="text-gray-400">naar inkomstenbron.</span></h2>
                                    <p className="text-xl text-gray-500 font-light max-w-2xl">
                                        De Holobox is een bedrijfsbrede investering. Verlaag je operationele kosten met remote personeel én genereer nieuwe omzet via ons Ad Network.
                                    </p>
                                </div>
                            </div>
                        </FadeIn>

                        <div className="grid grid-cols-1 md:grid-cols-12 gap-6 auto-rows-[auto]">
                            
                            <FadeIn delay={0} className="md:col-span-7">
                                <div className="bg-white border border-gray-200 soft-shadow rounded-[2.5rem] p-10 flex flex-col relative overflow-hidden h-full group transition-transform hover:-translate-y-1 duration-500">
                                    <div className="relative z-10 flex-1 flex flex-col justify-between">
                                        <div>
                                            <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-brand-gold/10 text-[10px] font-bold tracking-widest uppercase text-brand-gold mb-6 border border-brand-gold/20">
                                                <i className="ph-fill ph-bell-ringing text-sm"></i> Operatie & Personeel
                                            </div>
                                            <h3 className="text-3xl font-black tracking-tighter mb-4 text-black">De 24/7 virtuele conciërge<br/>die <span className="text-gradient-gold">kosten deelt.</span></h3>
                                            <p className="text-gray-500 leading-relaxed font-light mb-8 max-w-md">
                                                Geen gaten in roosters meer. Eén receptionist kan via de studio meerdere hotellobby's tegelijk bedienen. 
                                            </p>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 mt-auto">
                                            <div className="bg-gray-50 border border-gray-100 rounded-2xl p-4">
                                                <div className="text-brand-gold font-black text-2xl mb-1">-40%</div>
                                                <div className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Front-desk kosten</div>
                                            </div>
                                            <div className="bg-gray-50 border border-gray-100 rounded-2xl p-4">
                                                <div className="text-brand-gold font-black text-2xl mb-1">€2.000</div>
                                                <div className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Besparing p/m</div>
                                            </div>
                                        </div>
                                    </div>
                                    <i className="ph-thin ph-users absolute -right-10 -bottom-10 text-[200px] text-gray-50 group-hover:scale-110 transition-transform duration-700 pointer-events-none"></i>
                                </div>
                            </FadeIn>

                            <FadeIn delay={150} className="md:col-span-5">
                                <div className="bg-white border border-gray-200 soft-shadow rounded-[2.5rem] p-10 flex flex-col relative overflow-hidden h-full group transition-transform hover:-translate-y-1 duration-500">
                                    <div className="relative z-10 flex-1 flex flex-col justify-between">
                                        <div>
                                            <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-100 text-[10px] font-bold tracking-widest uppercase text-gray-500 mb-6">
                                                <i className="ph-fill ph-trend-up text-sm"></i> Conversie & Sales
                                            </div>
                                            <h3 className="text-3xl font-black tracking-tighter mb-4 text-black">Upselling in<br/>Levensgroot 3D.</h3>
                                            <p className="text-gray-500 leading-relaxed font-light mb-8">
                                                Visuele overtuigingskracht leidt tot actie. Verkoop kamer-upgrades, extra services of virtuele winkel-assortimenten effectiever.
                                            </p>
                                        </div>
                                        <div className="bg-gray-50 border border-gray-100 rounded-2xl p-4 mt-auto w-max">
                                            <div className="text-brand-gold font-black text-2xl mb-1">+ €300</div>
                                            <div className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Extra Upsell Omzet p/m</div>
                                        </div>
                                    </div>
                                    <i className="ph-thin ph-shopping-bag absolute -right-10 -bottom-10 text-[150px] text-gray-50 group-hover:scale-110 transition-transform duration-700 pointer-events-none"></i>
                                </div>
                            </FadeIn>

                            <FadeIn delay={300} className="md:col-span-12">
                                <div className="bg-black rounded-[2.5rem] p-10 lg:p-14 flex flex-col lg:flex-row items-center gap-12 relative overflow-hidden group shadow-2xl">
                                    <div className="absolute top-0 right-0 w-[800px] h-[800px] bg-brand-gold/10 rounded-full blur-[100px] group-hover:bg-brand-gold/20 transition-colors duration-1000 pointer-events-none"></div>
